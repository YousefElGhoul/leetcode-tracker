spring.application.name=leetcode-tracker

jwt.secret=${JWT_SECRET}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/leetcode}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:0000}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

server.forward-headers-strategy=framework

leetcode-graphql.base-url=https://leetcode.com/graphql

cors.allowed-origins=https://yousefelghoul.gitlab.io
cors.allowed-origin-patterns=http://localhost:*
